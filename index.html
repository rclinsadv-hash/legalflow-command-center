<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legalflow | Central de Comando</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- BARRA LATERAL -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-text">Legalflow</div>
                <div class="logo-sub">Command Center</div>
            </div>
            <nav>
                <div class="nav-group">PRINCIPAL</div>
                <div class="nav-btn active" onclick="showView('dashboard', this)"><i class="fas fa-th-large"></i> Dashboard</div>
                <div class="nav-btn" onclick="showView('intimacoes', this)"><i class="fas fa-bell"></i> Intimações</div>
                
                <div class="nav-group">GESTÃO</div>
                <div class="nav-btn" onclick="showView('processos', this)"><i class="fas fa-gavel"></i> Processos</div>
                <div class="nav-btn" onclick="showView('clientes', this)"><i class="fas fa-users"></i> Clientes</div>

                <div class="nav-group">FERRAMENTAS</div>
                <div class="nav-btn" onclick="showView('ia', this)"><i class="fas fa-robot"></i> Assistente IA</div>
                <div class="nav-btn" onclick="showView('whatsapp', this)"><i class="fas fa-comments"></i> WhatsApp</div>
                
                <div class="nav-group">SISTEMA</div>
                <div class="nav-btn" onclick="showView('config', this)"><i class="fas fa-cog"></i> Configurações</div>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 id="page-title">Dashboard</h1>
                <button class="btn-primary" onclick="syncDatajud()"><i class="fas fa-sync"></i> Sincronizar</button>
            </header>

            <div id="view-dashboard" class="view active">
                <div class="panel">
                    <h2>Bem-vindo ao Centro de Comando</h2>
                    <p>O sistema foi restaurado. Configure sua API Key para ativar as automações.</p>
                </div>
            </div>

            <!-- Outras Views (Intimações, IA, etc) -->
            <div id="view-ia" class="view">
                <div class="panel" style="height: 500px; display: flex; flex-direction: column;">
                    <div id="ia-chat-messages" style="flex: 1; overflow-y: auto;"></div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <input type="text" id="ia-chat-input" placeholder="Digite sua dúvida jurídica...">
                        <button onclick="sendChatMessage()">Enviar</button>
                    </div>
                </div>
            </div>

            <div id="view-config" class="view">
                <div class="panel">
                    <h3>Configurações de API</h3>
                    <div style="margin-bottom: 15px;">
                        <label>Provedor de IA</label>
                        <select id="ai-provider">
                            <option value="gemini">Google Gemini</option>
                            <option value="openai">OpenAI</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label>Chave de API (Key)</label>
                        <input type="password" id="ai-api-key" placeholder="Cole sua chave aqui...">
                    </div>
                    <button onclick="saveSettings()">Salvar Configurações</button>
                </div>
            </div>
        </main>
    </div>
    <div id="toast" style="display:none; position:fixed; bottom:20px; right:20px; background:#333; color:#fff; padding:10px 20px; border-radius:8px;"></div>
    <script src="app.js"></script>
</body>
</html>
